<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Dreame-Map</title>
<!--
  Reiter in der ioBroker-Verwaltung.

  Diese Seite ist BEWUSST nur eine Huelle. Das Widget selbst liegt in www/ und wird vom
  web-Adapter ausgeliefert — hier wird es nur eingebettet. Grund: die Verwaltung ist die
  Oberflaeche zum Verwalten, nicht fuer Endnutzer. Laege das Widget hier, braeuchte ein
  Wandtablett Zugriff auf Port 8081, also auf Adapterinstallation, Objekte und Passwoerter.
  Ausserdem gaebe es die Dateien dann doppelt.

  Ablauf: Adresse des web-Adapters aus dessen Instanzobjekt lesen, Rahmen damit fuellen.
  Klappt das Einbetten nicht (verschiedene Ports = verschiedene Herkuenfte, der Server darf
  das untersagen), erscheint stattdessen ein Knopf, der die Karte in einem neuen Reiter
  oeffnet. Deshalb die Zeitschaltung unten.
-->
<!-- Von der Verwaltung ausgeliefert; derselbe Pfad, den auch andere Adapter-Reiter nutzen -->
<script src="../../lib/js/socket.io.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  #rahmen{display:block;width:100%;height:100%;border:0}
  #hinweis{display:none;height:100%;box-sizing:border-box;padding:40px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
    text-align:center;color:#33383e}
  #hinweis.an{display:flex}
  #hinweis h2{margin:0;font-size:18px}
  #hinweis p{margin:0;max-width:520px;line-height:1.5;color:#5a6b88}
  #hinweis a{display:inline-block;padding:11px 20px;border-radius:9px;background:#3399cc;
    color:#fff;text-decoration:none;font-weight:700}
  #hinweis code{background:#eef2f8;padding:2px 6px;border-radius:5px}
</style>
</head>
<body>
<iframe id="rahmen" title="Dreame-Map"></iframe>
<div id="hinweis">
  <h2 id="hTitel">Karte wird geladen …</h2>
  <p id="hText"></p>
  <a id="hLink" href="#" target="_blank" rel="noopener" style="display:none">Karte in neuem Tab öffnen</a>
</div>
<script>
  const rahmen = document.getElementById('rahmen');
  const hinweis = document.getElementById('hinweis');
  const hTitel = document.getElementById('hTitel');
  const hText = document.getElementById('hText');
  const hLink = document.getElementById('hLink');

  function zeigeHinweis(titel, text, adresse){
    rahmen.style.display = 'none';
    hinweis.classList.add('an');
    hTitel.textContent = titel;
    hText.textContent = text;
    if (adresse){ hLink.href = adresse; hLink.style.display = ''; }
  }

  /**
   * Adresse des Widgets aus der Instanz des web-Adapters zusammenbauen.
   * Der Rechnername kommt aus der aktuellen Adresse, nicht aus dem Objekt: die Verwaltung
   * laeuft auf demselben Rechner, und so stimmt die Adresse auch bei Zugriff ueber einen
   * anderen Namen oder ueber VPN.
   */
  function baueAdresse(obj){
    if (!obj || !obj.native) return null;
    const port = obj.native.port || 8082;
    const protokoll = obj.native.secure ? 'https:' : 'http:';
    return `${protokoll}//${location.hostname}:${port}/dreame/`;
  }

  // Verbindung zur Verwaltung selbst — die Seite wird von ihr ausgeliefert, also reicht
  // die eigene Herkunft.
  const socket = io.connect(location.protocol + '//' + location.host);

  socket.emit('getObjectView', 'system', 'instance',
    { startkey: 'system.adapter.web.', endkey: 'system.adapter.web.香' },
    (fehler, ergebnis) => {
      if (fehler || !ergebnis || !ergebnis.rows || !ergebnis.rows.length){
        zeigeHinweis('Kein web-Adapter gefunden',
          'Die Karte wird vom web-Adapter ausgeliefert. Bitte installiere und starte eine ' +
          'Instanz des Adapters "web" — danach erscheint die Karte hier.');
        return;
      }
      // Bei mehreren Instanzen die erste aktivierte nehmen, sonst schlicht die erste.
      const zeilen = ergebnis.rows.map(r => r.value);
      const obj = zeilen.find(o => o && o.common && o.common.enabled) || zeilen[0];
      const adresse = baueAdresse(obj);
      if (!adresse){ zeigeHinweis('Adresse nicht ermittelbar',
        'Die Einstellungen des web-Adapters liessen sich nicht lesen.'); return; }

      // Laedt der Rahmen nicht (der Server darf das Einbetten untersagen — Verwaltung und
      // web-Adapter laufen auf verschiedenen Ports und sind damit verschiedene Herkuenfte),
      // wird nach kurzer Zeit auf den Knopf umgeschaltet.
      let geladen = false;
      rahmen.onload = () => { geladen = true; };
      rahmen.src = adresse;
      setTimeout(() => {
        if (!geladen) zeigeHinweis('Karte lässt sich hier nicht einbetten',
          'Der Browser oder der web-Adapter erlaubt die Anzeige innerhalb der Verwaltung ' +
          'nicht. Über den Knopf geht es in einem eigenen Tab.', adresse);
      }, 4000);
    });
</script>
</body>
</html>
